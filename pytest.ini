[pytest]
# AuthClear — Pytest Configuration

# Async support
asyncio_mode = auto

# Test paths
testpaths = mcp_server/tests a2a_agent/tests

# Output
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    -v

# Coverage
[coverage:run]
source = mcp_server,a2a_agent,shared
omit =
    */tests/*
    */__init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
