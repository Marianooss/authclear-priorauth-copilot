<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=960, height=1080">
    <title>ROI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 960px;
            height: 1080px;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 60px;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 60px;
            text-align: center;
        }

        .calculator {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            font-size: 32px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 400;
            opacity: 0.9;
        }

        .value {
            font-weight: 700;
            font-size: 36px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .total {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 3px solid rgba(255,255,255,0.4);
        }

        .total .label {
            font-size: 38px;
            font-weight: 600;
        }

        .total .value {
            font-size: 56px;
            color: #00ff88;
        }

        .subtitle {
            text-align: center;
            font-size: 28px;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="title">AuthClear ROI Calculator</div>

    <div class="calculator">
        <div class="section-title">Practice Size</div>
        <div class="row">
            <div class="label">Physicians</div>
            <div class="value">10</div>
        </div>
        <div class="row">
            <div class="label">Prior Auths per Week</div>
            <div class="value">430</div>
        </div>

        <div class="section-title">Time Savings</div>
        <div class="row">
            <div class="label">Minutes Saved per Auth</div>
            <div class="value">15 min</div>
        </div>
        <div class="row">
            <div class="label">Total Hours Saved per Week</div>
            <div class="value">8 hours</div>
        </div>

        <div class="section-title">Cost Savings</div>
        <div class="row">
            <div class="label">Staff Hourly Cost</div>
            <div class="value">$25/hr</div>
        </div>
        <div class="row">
            <div class="label">Weekly Labor Savings</div>
            <div class="value">$200</div>
        </div>

        <div class="row total">
            <div class="label">Annual ROI</div>
            <div class="value">$83,200</div>
        </div>
    </div>

    <div class="subtitle">
        Plus: Faster approvals, reduced denials, happier staff
    </div>
</body>
</html>
