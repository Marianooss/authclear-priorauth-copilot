<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>AuthClear Title Card - Final</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #4a3a7e 0%, #764ba2 50%, #3d2c5f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            overflow: hidden;
        }

        .logo {
            font-size: 140px;
            font-weight: 700;
            letter-spacing: -3px;
            margin-bottom: 20px;
            text-shadow: 0 6px 30px rgba(0,0,0,0.4);
            line-height: 1;
        }

        .logo .auth {
            color: #ffd700;
        }

        .logo .clear {
            color: #ffffff;
        }

        .subtitle {
            font-size: 44px;
            font-weight: 300;
            margin-bottom: 100px;
            opacity: 0.95;
            letter-spacing: 1px;
        }

        .hackathon {
            font-size: 28px;
            font-weight: 400;
            opacity: 0.7;
            position: absolute;
            bottom: 80px;
            letter-spacing: 0.5px;
        }

        /* Decorative elements */
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.03) 35px, rgba(255,255,255,.03) 70px);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="logo">
        <span class="auth">A</span><span class="clear">uth</span><span class="auth">C</span><span class="clear">lear</span>
    </div>

    <div class="subtitle">
        AI-Powered Prior Authorization
    </div>

    <div class="hackathon">
        Agents Assemble Hackathon 2026
    </div>
</body>
</html>
