<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=960, height=1080">
    <title>Compliance Badges</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 960px;
            height: 1080px;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 60px;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 80px;
            text-align: center;
        }

        .badge {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: slideIn 0.5s ease-out;
        }

        .badge:nth-child(2) {
            animation-delay: 0.2s;
        }

        .badge:nth-child(3) {
            animation-delay: 0.4s;
        }

        .badge:nth-child(4) {
            animation-delay: 0.6s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .badge-text {
            font-size: 36px;
            font-weight: 600;
        }

        .state {
            font-size: 28px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .checkmark {
            width: 60px;
            height: 60px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: #1a1a2e;
            font-weight: 700;
        }

        .footer {
            margin-top: 80px;
            font-size: 38px;
            font-weight: 600;
            color: #00ff88;
            text-align: center;
            line-height: 1.5;
        }

        .footer-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="title">Regulatory Compliance</div>

    <div class="badge">
        <div>
            <div class="badge-text">Texas SB 490</div>
            <div class="state">AI Transparency in Healthcare</div>
        </div>
        <div class="checkmark">✓</div>
    </div>

    <div class="badge">
        <div>
            <div class="badge-text">Arizona HB 2417</div>
            <div class="state">Prior Auth AI Disclosure</div>
        </div>
        <div class="checkmark">✓</div>
    </div>

    <div class="badge">
        <div>
            <div class="badge-text">Maryland HB 1174</div>
            <div class="state">Human Review Required</div>
        </div>
        <div class="checkmark">✓</div>
    </div>

    <div class="footer">
        <div class="footer-icon">👤</div>
        <div>Human-in-the-Loop</div>
        <div>Architecturally Enforced</div>
    </div>
</body>
</html>
