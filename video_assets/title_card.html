<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>AuthClear Title Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .logo {
            font-size: 120px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo .auth {
            color: #fff;
        }

        .logo .clear {
            color: #ffd700;
        }

        .subtitle {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 80px;
            opacity: 0.95;
        }

        .hackathon {
            font-size: 32px;
            font-weight: 400;
            opacity: 0.8;
            position: absolute;
            bottom: 60px;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 40px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <svg class="icon" viewBox="0 0 24 24" fill="white">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
    </svg>

    <div class="logo">
        <span class="auth">Auth</span><span class="clear">Clear</span>
    </div>

    <div class="subtitle">
        AI-Powered Prior Authorization
    </div>

    <div class="hackathon">
        Agents Assemble Hackathon 2026
    </div>
</body>
</html>
